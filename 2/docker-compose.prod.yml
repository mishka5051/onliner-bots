services:
  app:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-searxng}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      ENRICHMENT_ENABLED: ${ENRICHMENT_ENABLED:-true}
      SUPPLEMENTARY_SEARCH_ENABLED: ${SUPPLEMENTARY_SEARCH_ENABLED:-true}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-false}
      SCHEDULER_CRON: ${SCHEDULER_CRON:-0 9 * * 1}
      SHORTLIST_MIN_SCORE: ${SHORTLIST_MIN_SCORE:-50}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
