services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: events
      POSTGRES_PASSWORD: events
      POSTGRES_DB: event_search
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events -d event_search"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://events:events@db:5432/event_search
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-searxng}
      SEARXNG_BASE_URL: http://searxng:8080
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      DEBUG: "false"
      LOG_LEVEL: INFO
      SEARCH_RESULTS_LIMIT: "10"
      ENRICHMENT_ENABLED: "true"
      SUPPLEMENTARY_SEARCH_ENABLED: "true"
      SHORTLIST_MIN_SCORE: "50"
    depends_on:
      db:
        condition: service_healthy
      searxng:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
