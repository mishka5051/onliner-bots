# Минимальная конфигурация SearXNG для event-search-bot.
# Документация: https://docs.searxng.org/admin/settings/settings.html

use_default_settings:
  engines:
    remove:
      - duckduckgo images
      - duckduckgo videos
      - duckduckgo news
      - duckduckgo weather

engines:
  - name: brave
    disabled: true

server:
  secret_key: "change-me-in-production-use-openssl-rand-hex-32"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  default_lang: "ru"
  formats:
    - html
    - json

ui:
  static_use_hash: true
