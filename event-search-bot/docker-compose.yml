services:
  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  bot:
    build: .
    env_file:
      - .env
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080}
    volumes:
      - bot-data:/app/data
      - partnership-leads-data:/app/partnership-data
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bot-data:
  partnership-leads-data:
    external: true
    name: partnership-leads-data
